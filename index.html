<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./dist/script.js" defer></script>
    <title>to-do list</title>
    <style>
        :root {
            --gradient: linear-gradient(
                180deg,
                rgba(144, 238, 144, 1) 0%,
                #006400 100%
            );
            --dark: #001747;
            --grey: #b1bacb;
            --grey-border: rgba(210,210,210,075);
            --grey-light: #eeeeee;
            --grey-dark: #405175;
            --blue: #2d70fd;
            --green: #00d8a7;
            --black: #000000;
            --white: #ffffff;

        }

        body {
            background: var(--gradient); 
            margin: 0;
            height: 100vh;
            display: flex; 
            flex-direction: column; 
            justify-content: space-evenly; 
            align-items: center;
        }

        .button {
            color: var(--black);
            font-size: 1.1rem;
            padding: 0.7rem 1.5rem;
            border-radius: 0.3rem;
            border: none;
            position: absolute;
            right: 0.5rem;
            bottom: 0.5rem;
            background-color: var(--green);
            cursor: pointer;
        }

        .deleteTask {
        background-color: var(--green);
        color: var(--black);
        border: none;
        padding: 0.3rem 0.7rem;
        border-radius: 0.3rem;
        cursor: pointer;
        font-size: 0.9rem;
        margin-top: 0.4rem;
}

        #deleteButton:hover {
            background-color: var(--green);
            cursor: pointer;
            color: var(--black);
        }
        #deleteButton {
            background-color: var(--white);
            border: none;
            font-size: 1rem;
            color: var(--black);
            cursor: pointer;
        }

        h2,p {
            margin: 0;
        }

        /* /todo container/ */

        .todo {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            border-radius: 2rem;
            background: var(--white);
            padding: 3rem;
            height: 50%;
            width: 60%;
            box-shadow: 0 1rem 3rem 1rem rgba(0, 23, 71, 0.15);
            max-width: 30rem;
        }

        h2 {
            text-transform: uppercase;
            height: 3rem;
            color: var(--dark);
            text-align: center;
        }

        .input {
            position: relative;
            display: flex;
        }

        .input-field {
            width: 100%;
            border: 0.06rem solid #000000;
            border-radius: 0.5rem;
            padding: 1.25rem;
            font-size: 1rem;

        }

        input[type="text"]::placeholder {
            color: var(--grey);
        }

        .todo-container {
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: space-between;
        }

        ul {
            padding: 0;
            margin: 0;
            overflow-y: scroll;
        }

        li {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 1.2rem;
            padding: 1.3rem;
        }

        #todoList p {
            display: flex;
            gap: 1rem;
            color: var(--dark);
            align-items: center;
        }

        #todoList .disabled {
            color: #8f98a8;
        }

        .disabled {
            display: flex;
            text-decoration: line-through;
        }

        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            cursor: pointer;
        }

        input[type="checkbox"]::before {
            content: "\2713";
            display: inline-block;
            width: 2rem;
            height: 2rem;
            font-size: 1.75rem;
            text-align: center;
            border: 0.06rem solid var(--grey-border);
            border-radius: 50%;
            color: transparent;
        }
        input[type="checkbox"]:checked::before {
            color: var(--white);
            background-color: var(--green);
            border: 0.1rem solid var(--green);
            border-radius: 50%;
        }

        .counter {
            border: 0.06rem solid var(--grey-light);
        }

        .counter-container {
            height: 2rem;
            display: flex;
            justify-content: space-between;
            color: var(--grey);
        }

        .counter-container p {
            align-self: centercs;
        }

        .counter-container button {
            border: none;
            background-color: transparent;
            color: var(--grey);
            font-size: 1rem;
        }

        .footer {
            display: flex;
            gap: 1.8rem;
            background-color: var(--white);
            padding: 1.2rem;
            border-radius: 0.5rem;
        }

        .made-by, .author {
            font-size: 0.9rem;
        }

        .made-by {
            color: var(--grey-dark);
        }

        .author {
            color: var(--blue);
            font-weight: bold;
        }

        .scroll {
            height: 15rem;
            scrollbar-width: thin;
            scrollbar-color: var(--black) transparent;
            overflow-y: auto;
        }

        .scroll::-webkit-scrollbar {
            width: 0.6rem;
        }

        .scroll::-webkit-scrollbar-thumb {
            background-color: var(--blue);
            border-radius: 0.5rem;
        }

        .scroll::-webkit-scrollbar-track {
            display: none;
        }
    </style>
</head>
<body>
    <section class="todo">
        
        <h2>To-do List</h2>

        <div class="input">
            <input type="text" placeholder="Add a new task" class="input-field" id="todoInput">
            <button class="button">Add</button>
        </div>
        <ul class="scroll" id="todoList">
            <li class="todo-row">
            </li>
        </ul>
        <div>

            <hr class="counter">
            <div class="counter-container">
                <p>
                    <span id="todoCount">0</span> Items total
                </p>
                <button id="deleteButton">Delete All</button>
            </div>
        </div>
    </section>
    <footer>
        <div class="footer">
            <p class="made-by">Made by</p>
            <p class="author">Jesse Gitau</p>
        </div>
    </footer>
</body>

</html>
